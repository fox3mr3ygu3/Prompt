global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  # OTEL Collector exposes the OTLP-metrics-converted Prometheus endpoint here.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Self-scrape so the dashboard's Prometheus row works out of the box.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
