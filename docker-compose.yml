# quick-conf.app — full local stack (R8/R9).
#
# Services:
#   postgres, redis, meili      — data plane
#   backend1 / backend2          — two FastAPI replicas (round-robin behind nginx)
#   frontend                     — builds the SPA into a shared volume
#   nginx                        — TLS-ready edge: SPA fallback, RR proxy, token-bucket rate limit
#   cron                         — APScheduler container running payouts/rollup/sweeper
#   otel-collector, prometheus, tempo, loki, grafana  — observability stack (R12)

name: quick-conf

x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    meili:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)"]
    interval: 10s
    timeout: 3s
    retries: 15
    start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app} -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  meili:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devmasterkey_change_me}
      MEILI_ENV: development
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    ports:
      - "7700:7700"

  backend1:
    <<: *backend-base
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

  backend2:
    <<: *backend-base
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - frontend-dist:/www
    # The build container copies dist/ into the shared volume on each start.
    # nginx mounts the same volume read-only.

  nginx:
    image: openresty/openresty:alpine-fat
    restart: unless-stopped
    depends_on:
      - backend1
      - backend2
      - frontend
    environment:
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./infra/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./infra/nginx/lua:/etc/nginx/lua:ro
      - frontend-dist:/var/www/html:ro
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "ops.cron.schedule"]
    volumes:
      - ./ops:/app/ops:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - tempo
      - loki
      - prometheus
    ports:
      - "4317:4317"  # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infra/loki/loki.yaml:/etc/loki/loki.yaml:ro

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres-data:
  redis-data:
  meili-data:
  frontend-dist:
  prom-data:
  tempo-data:
  grafana-data:
