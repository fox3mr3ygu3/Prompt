worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

env RATE_LIMIT_RPS;
env RATE_LIMIT_BURST;
env REDIS_HOST;
env REDIS_PORT;

events {
    worker_connections 4096;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 4m;

    resolver 127.0.0.11 ipv6=off valid=30s;

    lua_package_path  "/etc/nginx/lua/?.lua;;";
    lua_shared_dict ratelimit_state 10m;
    init_by_lua_block {
        require "token_bucket"
    }

    upstream backend {
        server backend1:8000 max_fails=3 fail_timeout=10s;
        server backend2:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        location ~ ^/api/(events/[^/]+/(hold|orders)|tickets/scan) {
            access_by_lua_block {
                local tb = require "token_bucket"
                tb.check({
                    rate = tonumber(os.getenv("RATE_LIMIT_RPS")) or 20,
                    burst = tonumber(os.getenv("RATE_LIMIT_BURST")) or 40,
                    key = "ip:" .. ngx.var.remote_addr,
                })
            }
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://backend;
        }

        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 1h;
            proxy_set_header Host $host;
            proxy_pass http://backend;
        }

        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://backend;
        }

        location ~ ^/(docs|openapi.json|healthz|readyz) {
            proxy_pass http://backend;
        }

        root /var/www/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
